<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>SchoolSync — School Management Platform for Liberia</title>
    <meta name="description" content="SchoolSync is a unified SaaS school management platform built for Liberian schools. Manage student enrollment, fees, attendance, grades, letters, timetables, and more — all in one place." />
    <meta name="keywords" content="school management system, Liberia schools, student enrollment, school fees, attendance tracking, SchoolSync, SaaS education" />
    <meta name="author" content="SchoolSync" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.schoolsyncedu.com" />

    <!-- PWA meta — manifest is injected dynamically by SchoolSite.tsx per school -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Favicon + App Icon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/SchoolSync_logo.png" />
    <link rel="apple-touch-icon" href="/icon-512.svg" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.schoolsyncedu.com" />
    <meta property="og:site_name" content="SchoolSync" />
    <meta property="og:title" content="SchoolSync — School Management Platform for Liberia" />
    <meta property="og:description" content="A unified SaaS platform for enrollment, grades, attendance, fees, communication, and more — designed specifically for schools in Liberia." />
    <meta property="og:image" content="https://www.schoolsyncedu.com/SchoolSync_logo.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="SchoolSync Logo" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="SchoolSync — School Management Platform for Liberia" />
    <meta name="twitter:description" content="A unified SaaS platform for enrollment, grades, attendance, fees, and more — built for Liberian schools." />
    <meta name="twitter:image" content="https://www.schoolsyncedu.com/SchoolSync_logo.png" />

    <!-- Google / Schema.org Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "SchoolSync",
      "url": "https://www.schoolsyncedu.com",
      "logo": "https://www.schoolsyncedu.com/SchoolSync_logo.png",
      "image": "https://www.schoolsyncedu.com/SchoolSync_logo.png",
      "description": "A unified SaaS school management platform for Liberian schools. Manage enrollment, fees, grades, attendance, timetables, letters, and communication in one place.",
      "applicationCategory": "EducationApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "publisher": {
        "@type": "Organization",
        "name": "SchoolSync",
        "url": "https://www.schoolsyncedu.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://www.schoolsyncedu.com/SchoolSync_logo.png"
        }
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
