          "@type": "Question",

            "@type": "Answer",

          "@type": "Question",
          "name": "Is there a school management system for schools in Liberia?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. SchoolSync was built specifically for Liberian schools. It supports Liberian Dollar (LRD) and USD fee payments, MTN Mobile Money, WAEC (LJHSCE and WASSCE) exam registration, and is designed around how Liberian and West African schools operate."
          }
        },
        {
          "@type": "Question",
          "name": "What features does SchoolSync include?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SchoolSync includes: student enrollment and profiles, digital attendance with NFC cards, grade entry and report cards, fee billing and mobile money collection, timetable scheduling, library management, NFC-enabled student ID cards, parent portal, staff management, announcements and messaging, WAEC exam registration, and financial analytics."
          }
        },
        {
          "@type": "Question",
          "name": "Can parents and students access SchoolSync?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. SchoolSync has a student portal where students can view grades, attendance, report cards, fee status, timetable, and library checkouts. Parents have their own portal to monitor their child's progress and receive school announcements."
          }
        },
        {
          "@type": "Question",
          "name": "Does SchoolSync work on mobile phones?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. SchoolSync is fully responsive and works on any device with a web browser — phones, tablets, and computers. No app download is required."
          }
        },
